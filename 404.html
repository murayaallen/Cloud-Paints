<style>
  .nf-root {
    min-height: calc(100vh - 88px);
    display: grid;
    place-items: center;
    padding: 80px 20px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(217,40,67,.10), transparent 55%),

      var(--bg-1);

    overflow: hidden;
  }
  .nf-root::before {
    content: "";
    position: absolute; inset: 0;
    background-image: var(--grain, none);
    opacity: .05; pointer-events: none;
  }
  .nf-inner {
    max-width: 640px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .nf-drip {
    display: block;
    margin: 0 auto 32px;
    width: 120px; height: 180px;
    filter: drop-shadow(0 20px 40px rgba(217,40,67,.25));
  }
  .nf-num {
    font-family: var(--serif);
    font-size: clamp(5rem, 14vw, 9rem);

    color: var(--red-2, #d92843);
    margin: 0 0 12px;
    letter-spacing: -0.02em;
  }
  .nf-eyebrow {
    font-family: var(--sans);

    margin-bottom: 16px;
  }
  .nf-h1 {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 500;
    margin: 0 0 16px;
    color: var(--text-1);
  }
  .nf-h1 em { font-style: italic; color: var(--red-2, #d92843); }
  .nf-lede {
    color: var(--text-2);
    font-size: 1.05rem;
    line-height: 1.6;
    margin: 0 auto 36px;
    max-width: 480px;
  }
  .nf-ctas {
    display: inline-flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  }
  .nf-ctas a {
    padding: 14px 24px;
    border-radius: 100px;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    transition: transform .2s, box-shadow .2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .nf-ctas .primary { background: var(--red-2, #d92843); color: #fff; }
  .nf-ctas .primary:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(217,40,67,.28); }
  .nf-ctas .ghost { color: var(--text-1); border: 1px solid var(--line-1, #e5e7eb); background: transparent; }
  .nf-ctas .ghost:hover { background: var(--bg-2, #f7f5f0); }
